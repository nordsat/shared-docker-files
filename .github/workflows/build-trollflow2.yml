name: Publish the trollflow2 Docker image

on:
  push:
    paths:
      - trollflow2/**

jobs:
  push_to_registry:
    name: Push ${{ matrix.flavor }} image to Docker Hub
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [uv, mamba]

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata (tags, labels) for trollflow2
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mraspaud/trollflow2
          flavor: |
            suffix=-${{ matrix.flavor }},onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push trollflow2 image
        uses: docker/build-push-action@v5
        with:
          context: ./trollflow2
          file: ./trollflow2/Containerfile.${{ matrix.flavor }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
